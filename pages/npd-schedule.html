<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPD Schedule</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="page-header">
    <h1>NPD Schedule</h1>
    <p id="streakBadge" class="streak-badge">Streak: --</p>
    <nav class="top-nav">
      <a href="../index.html">Dashboard</a>
      <a href="./npd-parts.html">NPD Parts</a>
      <a href="./npd-tracker.html">NPD Tracker</a>
      <a href="./npd-schedule.html" aria-current="page">NPD Schedule</a>
      <a href="./master-sheet.html">Master Sheet</a>
    </nav>
  </header>

  <main class="page-grid">
    <section class="card">
      <h2>Add Schedule Block</h2>
      <form id="timetableForm" class="stack-form">
        <input id="ttDate" type="date" required>
        <div class="inline-fields four-col">
          <input id="ttStartHour" type="number" min="0" max="23" step="1" placeholder="Start hour" required>
          <input id="ttStartMinute" type="number" min="0" max="59" step="1" placeholder="Start minute" required>
          <input id="ttEndHour" type="number" min="0" max="23" step="1" placeholder="End hour" required>
          <input id="ttEndMinute" type="number" min="0" max="59" step="1" placeholder="End minute" required>
        </div>
        <input id="ttBlock" type="text" placeholder="Block (e.g., Prototype Review)" required>
        <select id="ttType" required>
          <option value="Deep Work">Deep Work</option>
          <option value="Admin">Admin</option>
          <option value="Personal">Personal</option>
          <option value="Break">Break</option>
          <option value="Other">Other</option>
        </select>
        <input id="ttLinkedTask" type="text" placeholder="Linked Part/Task (optional)">
        <select id="ttStatus" required>
          <option value="Pending" selected>Pending</option>
          <option value="Other">Other</option>
        </select>
        <input id="ttRemark" type="text" placeholder="Remark (optional)">
        <button type="submit">Add Block</button>
      </form>
      <p id="ttMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Pending Blocks (Today)</h2>
      <ul id="ttTodayPendingList"></ul>
    </section>

    <section class="card">
      <h2>Other Blocks</h2>
      <ul id="ttOtherList"></ul>
    </section>

    <section class="card">
      <h2>Completed Blocks (Selected Date)</h2>
      <ul id="ttDoneList"></ul>
    </section>
  </main>

  <script src="../auth.js"></script>
  <script type="module" src="./npd-schedule.js"></script>
</body>
</html>
