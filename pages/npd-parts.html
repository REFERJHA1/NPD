<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPD Parts</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="page-header">
    <h1>NPD Parts</h1>
    <p id="streakBadge" class="streak-badge">Streak: --</p>
    <nav class="top-nav">
      <a href="../index.html">Dashboard</a>
      <a href="./npd-parts.html" aria-current="page">NPD Parts</a>
      <a href="./npd-tracker.html">NPD Tracker</a>
      <a href="./npd-schedule.html">NPD Schedule</a>
      <a href="./master-sheet.html">Master Sheet</a>
    </nav>
  </header>

  <main class="page-grid">
    <section class="card">
      <h2>Add NPD Part</h2>
      <form id="workTaskForm" class="stack-form">
        <input id="workDate" type="date" required>
        <input id="workTask" type="text" placeholder="Part / Task" required>
        <select id="workPriority" required>
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="workStatus" required>
          <option value="Pending" selected>Pending</option>
          <option value="Feedback Pending">Feedback Pending</option>
          <option value="Other">Other</option>
        </select>
        <div class="inline-fields two-col">
          <input id="workHour" type="number" min="0" max="23" step="1" placeholder="Hour (0-23)">
          <input id="workMinute" type="number" min="0" max="59" step="1" placeholder="Minute (0-59)">
        </div>
        <input id="workNotes" type="text" placeholder="Notes">
        <input id="workRemark" type="text" placeholder="Remark (optional)">
        <button type="submit">Add Part</button>
      </form>
      <p id="workMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Pending NPD Parts (Today) <span id="workPendingCount" class="count-badge">0</span></h2>
      <ul id="workTodayList"></ul>
    </section>

    <section class="card">
      <h2>Feedback Pending <span id="workFeedbackCount" class="count-badge">0</span></h2>
      <ul id="workFeedbackList"></ul>
    </section>

    <section class="card">
      <h2>Other NPD Parts <span id="workOtherCount" class="count-badge">0</span></h2>
      <ul id="workAllList"></ul>
    </section>

    <section class="card">
      <h2>Completed NPD Parts (Selected Date) <span id="workArchiveCount" class="count-badge">0</span></h2>
      <ul id="workDoneList"></ul>
    </section>
  </main>

  <script src="../auth.js"></script>
  <script type="module" src="./npd-parts.js"></script>
</body>
</html>
