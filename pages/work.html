<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Tasks</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="page-header">
    <h1>Work Tasks</h1>
    <p id="streakBadge" class="streak-badge">Streak: --</p>
    <nav class="top-nav">
      <a href="../index.html">Dashboard</a>
      <a href="./work.html" aria-current="page">Work</a>
      <a href="./personal.html">Personal</a>
      <a href="./habits.html">Habits</a>
      <a href="./journal.html">Journal</a>
      <a href="./analytics.html">Analytics</a>
      <a href="./timetable.html">TimeTable</a>
      <a href="./raw-notes.html">Raw Notes</a>
    </nav>
  </header>

  <main class="page-grid">
    <section class="card">
      <h2>Add Work Task</h2>
      <form id="workTaskForm" class="stack-form">
        <input id="workDate" type="date" required>
        <input id="workTask" type="text" placeholder="Task" required>
        <select id="workPriority" required>
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="workStatus" required>
          <option value="Pending" selected>Pending</option>
          <option value="Feedback Pending">Feedback Pending</option>
          <option value="Other">Other</option>
        </select>
        <div class="inline-fields two-col">
          <input id="workHour" type="number" min="0" max="23" step="1" placeholder="Hour (0-23)">
          <input id="workMinute" type="number" min="0" max="59" step="1" placeholder="Minute (0-59)">
        </div>
        <input id="workNotes" type="text" placeholder="Notes">
        <input id="workRemark" type="text" placeholder="Remark (optional)">
        <button type="submit">Add Task</button>
      </form>
      <p id="workMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Today's Pending Work Tasks <span id="workPendingCount" class="count-badge">0</span></h2>
      <ul id="workTodayList"></ul>
    </section>

    <section class="card">
      <h2>Feedback Pending Tasks <span id="workFeedbackCount" class="count-badge">0</span></h2>
      <ul id="workFeedbackList"></ul>
    </section>

    <section class="card">
      <h2>Other Work Tasks <span id="workOtherCount" class="count-badge">0</span></h2>
      <ul id="workAllList"></ul>
    </section>

    <section class="card">
      <h2>Completed Work Tasks (Selected Date) <span id="workArchiveCount" class="count-badge">0</span></h2>
      <ul id="workDoneList"></ul>
    </section>
  </main>

  <script src="../auth.js"></script>
  <script type="module" src="./work.js"></script>
</body>
</html>
